# Pick-and-place desk scene for Genesis sim.
# Edit objects below — set enabled: false to remove, color as RGB 0–1 or hex.
name: pick_place_desk
description: SO-101 arm on a desk with Sharpie pen and block cup holder for sim-to-real twin tests.
task: "Pick up the pen and place it in the holder"

# Pen layout (horizontal, lying on desk along +X):
#   total length 0.135 m — 60% white barrel, 40% black cap
#   euler [0, 90, 0] lays default Z-axis cylinders flat along X

objects:
  desk:
    shape: box
    size: [0.5, 0.35, 0.02]
    pos: [0.35, 0.0, 0.01]
    fixed: true
    color: [0.45, 0.32, 0.18]
    surface: rough

  pen_white:
    shape: cylinder
    radius: 0.007
    height: 0.081
    pos: [0.253, 0.08, 0.027]
    euler: [0, 90, 0]
    color: "#f4f4f4"
    surface: plastic

  pen_cap:
    shape: cylinder
    radius: 0.007
    height: 0.054
    pos: [0.3205, 0.08, 0.027]
    euler: [0, 90, 0]
    color: "#141414"
    surface: plastic

  # Block outer shell (dark square cup body)
  holder_shell:
    shape: box
    size: [0.048, 0.048, 0.07]
    pos: [0.42, -0.08, 0.055]
    fixed: true
    color: "#1a1a1a"
    surface: rough

  # Metal-lined inner cup (cylinder visible at the opening)
  holder_inner:
    shape: cylinder
    radius: 0.0155
    height: 0.064
    pos: [0.42, -0.08, 0.054]
    fixed: true
    color: [0.75, 0.77, 0.80]
    surface: aluminum

  # Optional extra props — toggle enabled or copy to add more objects
  red_cube:
    shape: box
    size: [0.03, 0.03, 0.03]
    pos: [0.30, -0.06, 0.05]
    color: "#e63946"
    surface: plastic
    enabled: false

  green_sphere:
    shape: sphere
    radius: 0.02
    pos: [0.38, 0.10, 0.06]
    color: [0.2, 0.75, 0.3]
    enabled: false
